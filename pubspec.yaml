name: bijlismart
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  lottie: ^3.3.2
  fluttertoast: ^9.0.0
  intl: ^0.19.0
  google_generative_ai: ^0.4.0
  firebase_storage: ^13.0.6
  image_picker: ^1.2.1
  smooth_page_indicator: ^1.1.0
  fl_chart: ^0.66.0
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.2
  google_sign_in: ^6.2.1
  provider: ^6.1.5+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  flutter_launcher_icons: "^0.13.1"


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assests/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assests/images/